<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Grant's Picks | NYC</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>
<style>
    :root {
        --brand-red: #FF0000;
        --ios-blur: blur(24px);
    }
    body { margin: 0; padding: 0; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; overflow: hidden; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }

    /* --- ULTRA-PREMIUM GLASS UI --- */
    .glass-ui {
        background: rgba(20, 20, 22, 0.65);
        backdrop-filter: var(--ios-blur);
        -webkit-backdrop-filter: var(--ios-blur);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        border-radius: 18px;
    }

    /* --- BRANDING WATERMARK --- */
    .watermark {
        position: absolute; top: 20px; left: 20px; z-index: 10;
        color: #fff; font-size: 11px; font-weight: 800;
        text-transform: uppercase; letter-spacing: 2px; text-decoration: none;
        padding: 12px 18px; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), top 0.3s;
    }
    .watermark:hover { color: var(--brand-red); transform: scale(1.03); }

    /* --- TOP BAR: SEARCH & FILTER --- */
    .top-bar-container {
        position: absolute; top: 20px; right: 20px; z-index: 10; 
        display: flex; align-items: center; padding: 8px 16px; gap: 16px;
        transition: all 0.3s ease;
    }
    .search-container { display: flex; align-items: center; }
    #search-input {
        background: transparent; border: none; color: #fff; outline: none;
        font-family: inherit; font-size: 14px; font-weight: 500; width: 150px;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #search-input::placeholder { color: rgba(255,255,255,0.5); font-weight: 500; }
    #search-input:focus { width: 200px; } 

    .divider { width: 1px; height: 20px; background: rgba(255,255,255,0.15); }

    .filter-container { display: flex; align-items: center; }
    .filter-label { color: rgba(255,255,255,0.5); font-weight: 800; font-size: 10px; margin-right: 8px; letter-spacing: 1.5px; }
    #category-select {
        background: transparent; color: #fff; border: none; font-weight: 700;
        font-size: 13px; font-family: inherit; cursor: pointer; outline: none; letter-spacing: 0.5px;
    }
    #category-select option { background: #1c1c1e; color: #fff; }

    /* --- THE "BLACK CARD" WELCOME OVERLAY --- */
    #welcome-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        z-index: 9999; display: flex; justify-content: center; align-items: center;
        transition: opacity 0.5s ease; padding: 20px; box-sizing: border-box;
    }
    .welcome-content {
        background: rgba(20, 20, 22, 0.85); padding: 50px 40px; border-radius: 32px;
        box-shadow: 0 40px 80px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        text-align: center; max-width: 340px; width: 100%; border: 1px solid rgba(255,255,255,0.1);
    }
    .welcome-title { font-weight: 900; text-transform: uppercase; font-size: 28px; margin-bottom: 12px; color: #fff; letter-spacing: -0.5px; }
    .welcome-desc { font-size: 15px; color: #aaa; margin-bottom: 30px; line-height: 1.6; font-weight: 400; }
    .welcome-btn {
        background: var(--brand-red); color: #fff; border: none; padding: 16px 30px;
        font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 14px;
        letter-spacing: 1px; width: 100%; border-radius: 14px; transition: transform 0.2s, background 0.2s;
        box-shadow: 0 8px 20px rgba(255, 0, 0, 0.3);
    }
    .welcome-btn:hover { background: #e60000; transform: translateY(-2px); box-shadow: 0 12px 24px rgba(255, 0, 0, 0.4); }

    /* --- THUMBNAIL PHOTO MARKERS --- */
    .photo-marker {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background-size: cover;
        background-position: center;
        border: 2.5px solid #fff;
        box-shadow: 0 6px 16px rgba(0,0,0,0.6);
        cursor: pointer;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
        z-index: 20;
    }
    .photo-marker:hover {
        transform: scale(1.15) translateY(-5px);
        box-shadow: 0 10px 24px rgba(0,0,0,0.8), 0 0 0 3px var(--brand-red);
        z-index: 30;
    }
    /* The little triangle pointer at the bottom of the photo */
    .photo-marker::after {
        content: ''; position: absolute; bottom: -8px; left: 50%;
        transform: translateX(-50%); border-width: 8px 7px 0; border-style: solid;
        border-color: #fff transparent transparent transparent;
    }

    /* --- FALLBACK MONOGRAM MARKER --- */
    .fallback-marker {
        background: linear-gradient(135deg, #1c1c1e, #050505);
        border-color: var(--brand-red); /* Uses your glowing red for the ring */
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .fallback-text {
        color: #fff;
        font-weight: 900;
        font-size: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }

    /* --- THE CINEMATIC MAP BLUR --- */
    .mapboxgl-canvas { transition: filter 0.8s cubic-bezier(0.4, 0, 0.2, 1) !important; }
    .map-dimmed { filter: blur(12px) brightness(0.25) !important; }

    /* GPS BUTTON FIX FOR DARK MODE */
    .mapboxgl-ctrl-group { background: rgba(20, 20, 22, 0.65) !important; backdrop-filter: var(--ios-blur); border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 12px !important; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important; margin-bottom: 30px; margin-right: 15px; }
    .mapboxgl-ctrl-icon { filter: invert(1); opacity: 0.8; }

    /* --- PREMIUM POPUP STYLES --- */
    .mapboxgl-popup { z-index: 50; }
    .mapboxgl-popup-content {
        padding: 0; background: #fff; border-radius: 24px; overflow: hidden;
        box-shadow: 0 30px 60px rgba(0,0,0,0.6); width: 300px; max-width: 90vw; border: none;
    }
    .popup-inner { padding: 22px; }
    .popup-title { font-weight: 900; text-transform: uppercase; font-size: 22px; margin-bottom: 4px; letter-spacing: -0.8px; color: #111; }
    .popup-meta { font-size: 11px; color: #888; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; }
    .popup-score { color: var(--brand-red); font-weight: 900; font-size: 15px; margin-bottom: 14px; }
    .popup-img { width: 100%; height: 200px; object-fit: cover; display: block; }
    .popup-vibe { font-size: 12px; font-weight: 600; color: #444; margin-bottom: 10px; background: #f0f0f0; padding: 8px 12px; border-radius: 8px; display: inline-block; }
    .popup-take { font-size: 14px; line-height: 1.5; color: #333; margin-bottom: 14px; padding-top: 10px; border-top: 1px solid #eee; }
    
    .btn-container { display: flex; gap: 10px; padding: 0 22px 22px 22px; }
    .btn { flex: 1; text-align: center; padding: 12px; font-size: 11px; font-weight: 800; text-decoration: none; text-transform: uppercase; border-radius: 12px; transition: opacity 0.2s, transform 0.2s; }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-black { background: #000; color: #fff; }
    .btn-outline { background: #f0f0f0; color: #000; }

    @media (max-width: 600px) {
        .top-bar-container { top: 15px; right: 15px; left: 15px; justify-content: space-between; padding: 10px 14px; }
        #search-input { width: 110px; font-size: 13px; }
        #search-input:focus { width: 140px; }
        .watermark { top: 75px; left: 15px; padding: 10px 14px; }
        .mapboxgl-popup-content { width: 280px; } 
        .popup-img { height: 160px; } 
        .welcome-content { padding: 40px 25px; }
        .welcome-title { font-size: 24px; }
    }
</style>
</head>
<body>

<div id="welcome-overlay">
    <div class="welcome-content">
        <div class="welcome-title">Grant's Picks</div>
        <div class="welcome-desc">A highly curated, no-bs guide to the best spots in the city. Good food, good drinks, good vibes only.</div>
        <button class="welcome-btn" id="enter-btn">Explore the Map</button>
    </div>
</div>

<a href="https://instagram.com/grantwillian" target="_blank" class="watermark glass-ui">@grantwillian</a>

<div class="top-bar-container glass-ui">
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search a spot..." autocomplete="off">
    </div>
    <div class="divider"></div>
    <div class="filter-container">
        <span class="filter-label">FILTER</span>
        <select id="category-select">
            <option value="all">Show All</option>
            <option value="Restaurant">Restaurants</option>
            <option value="Bakery/Cafe">Bakeries</option>
            <option value="Bar/Speakeasy">Bars</option>
            <option value="Street Food">Street Food</option>
            <option value="Shop">Shops</option>
        </select>
    </div>
</div>

<div id="map"></div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiZ3JhbnRzZW50bWUiLCJhIjoiY21semtoaHl5MDgyMzNlb2s3M2J5eGdyMiJ9.O0JLwYp11XNKPZB9FDXgMg';
    
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/grantsentme/cmlzkldac001601scglds8nyx', 
        center: [-73.988, 40.730], 
        zoom: 15.8,
        pitch: 68, 
        bearing: -15,
        antialias: true
    });

    map.addControl(new mapboxgl.GeolocateControl({ positionOptions: { enableHighAccuracy: true }, trackUserLocation: true, showUserHeading: true }), 'bottom-right');
    map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');

    map.on('load', () => {
        // --- INVISIBLE LAYER OVERRIDE ---
        // We make your old dots/diamonds invisible so the new Photo Thumbnails take over
        const layerType = map.getLayer('grantsentmemap') ? map.getLayer('grantsentmemap').type : null;
        if (layerType === 'symbol') { map.setPaintProperty('grantsentmemap', 'icon-opacity', 0); map.setPaintProperty('grantsentmemap', 'text-opacity', 0); }
        else if (layerType === 'circle') { map.setPaintProperty('grantsentmemap', 'circle-opacity', 0); map.setPaintProperty('grantsentmemap', 'circle-stroke-opacity', 0); }

        // --- TIME OF DAY LIGHTING ---
        function setDynamicLighting() {
            const currentHour = new Date().getHours();
            let fogColor, bldgColor;
            if (currentHour >= 6 && currentHour < 9) { fogColor = '#4a5568'; bldgColor = '#1a1c23'; } 
            else if (currentHour >= 9 && currentHour < 17) { fogColor = '#718096'; bldgColor = '#2d3748'; } 
            else if (currentHour >= 17 && currentHour < 20) { fogColor = '#ff5e62'; bldgColor = '#2a1715'; } 
            else { fogColor = '#050505'; bldgColor = '#0a0a0a'; }

            map.setFog({ 'range': [0.5, 8], 'color': fogColor, 'horizon-blend': 0.1 });
            if (map.getLayer('3d-buildings')) map.setPaintProperty('3d-buildings', 'fill-extrusion-color', bldgColor);
        }

        if (!map.getSource('composite')) map.addSource('composite', { type: 'vector', url: 'mapbox://mapbox.mapbox-streets-v8' });
        
        const layers = map.getStyle().layers;
        let labelLayerId;
        for (let i = 0; i < layers.length; i++) { if (layers[i].type === 'symbol' && layers[i].layout['text-field']) { labelLayerId = layers[i].id; break; } }

        map.addLayer({
            'id': '3d-buildings',
            'source': 'composite',
            'source-layer': 'building',
            'filter': ['==', 'extrude', 'true'],
            'type': 'fill-extrusion',
            'minzoom': 14,
            'paint': {
                'fill-extrusion-color': '#0a0a0a', 
                'fill-extrusion-height': ['get', 'height'],
                'fill-extrusion-base': ['get', 'min_height'],
                'fill-extrusion-opacity': 0.9 
            }
        }, labelLayerId);

        setDynamicLighting();

        // --- PREMIUM RADAR PULSE ---
        if (map.getLayer('grantsentmemap')) {
            map.addLayer({
                'id': 'pulse-layer',
                'type': 'circle',
                'source': map.getLayer('grantsentmemap').source,
                'source-layer': map.getLayer('grantsentmemap').sourceLayer,
                'paint': { 'circle-radius': 0, 'circle-color': '#FF0000', 'circle-opacity': 1, 'circle-stroke-width': 0 }
            }, 'grantsentmemap');

            let radius = 0; let opacity = 1;
            function animateMarker() {
                radius += 0.2; opacity -= 0.012; 
                if (radius > 16) { radius = 0; opacity = 1; }
                map.setPaintProperty('pulse-layer', 'circle-radius', radius);
                map.setPaintProperty('pulse-layer', 'circle-opacity', Math.max(0, opacity)); 
                requestAnimationFrame(animateMarker);
            }
            animateMarker();
        }
    });

    // --- PHOTO MARKER GENERATOR W/ FALLBACK LOGIC ---
    const dynamicMarkers = {};

    map.on('render', () => {
        if (!map.getLayer('grantsentmemap')) return;
        const features = map.queryRenderedFeatures({ layers: ['grantsentmemap'] });
        
        features.forEach(feature => {
            const coords = feature.geometry.coordinates;
            const uniqueId = feature.properties.Name + coords[0];

            if (!dynamicMarkers[uniqueId]) {
                const imgSource = feature.properties['Photo URL'] || feature.properties['Photo URL '];
                const placeName = feature.properties.Name || '?';
                
                const el = document.createElement('div');
                el.className = 'photo-marker';
                
                // If there's a photo, use it. If not, trigger the Monogram Placeholder.
                if (imgSource && imgSource.trim() !== '') {
                    el.style.backgroundImage = `url(${imgSource.trim()})`;
                } else {
                    el.classList.add('fallback-marker');
                    el.innerHTML = `<span class="fallback-text">${placeName.charAt(0).toUpperCase()}</span>`;
                }
                
                const marker = new mapboxgl.Marker({ element: el, anchor: 'bottom' })
                    .setLngLat(coords)
                    .addTo(map);

                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    triggerPopup(feature);
                });

                dynamicMarkers[uniqueId] = { marker: marker, feature: feature };
            }
        });

        updateFilters(); // Ensures markers follow the search rules immediately
    });

    // --- IDLE SCREENSAVER LOGIC ---
    let spinFrame;
    let isOrbiting = false;
    let idleTimer;
    const IDLE_TIME = 8000; 

    function spinGlobe() {
        if (!isOrbiting) return;
        map.setBearing(map.getBearing() + 0.04); 
        spinFrame = requestAnimationFrame(spinGlobe);
    }

    function startIdleSpin() {
        if (!isOrbiting) { isOrbiting = true; spinGlobe(); }
    }

    function stopSpinning() {
        isOrbiting = false;
        if (spinFrame) { cancelAnimationFrame(spinFrame); spinFrame = null; }
    }

    function resetIdleTimer() {
        stopSpinning(); 
        clearTimeout(idleTimer);
        const overlay = document.getElementById('welcome-overlay');
        if (overlay.style.display === 'none') idleTimer = setTimeout(startIdleSpin, IDLE_TIME);
    }

    ['mousedown','mousemove','touchstart','touchmove','wheel','dragstart','zoomstart','pitchstart'].forEach(evt => map.on(evt, resetIdleTimer));
    document.getElementById('search-input').addEventListener('input', resetIdleTimer);
    document.getElementById('search-input').addEventListener('focus', resetIdleTimer);
    document.getElementById('category-select').addEventListener('change', resetIdleTimer);

    // --- CENTRALIZED POPUP LOGIC ---
    let currentPopup = null;

    function triggerPopup(feature) {
        resetIdleTimer();
        const props = feature.properties;
        const coordinates = feature.geometry.coordinates.slice();

        const imgSource = props['Photo URL'] || props['Photo URL '];
        const socialLink = props['Social Link'] || props['IG Link'];
        const webLink = props['Link to their Website'];
        const metaText = [props.Cuisine || '', props.Price || ''].filter(Boolean).join(' &bull; ');

        const formatLink = (link) => {
            if (!link) return null;
            let clean = link.trim();
            if (clean.startsWith('@')) return `https://www.instagram.com/${clean.replace('@','')}`;
            if (!clean.startsWith('http')) return `https://${clean}`;
            return clean;
        };

        const html = `
            ${imgSource ? `<img class="popup-img" src="${imgSource.trim()}" onerror="this.style.display='none'">` : ''}
            <div class="popup-inner">
                <div class="popup-title">${props.Name || 'Place Name'}</div>
                ${metaText ? `<div class="popup-meta">${metaText}</div>` : ''}
                <div class="popup-score">SCORE: ${props.Score || 'N/A'}</div>
                ${props.Vibe ? `<div class="popup-vibe">Vibe: ${props.Vibe}</div>` : ''}
                <div class="popup-take">${props.Review || 'No review yet.'}</div>
            </div>
            <div class="btn-container">
                ${socialLink ? `<a href="${formatLink(socialLink)}" target="_blank" class="btn btn-black">Social</a>` : ''}
                ${webLink ? `<a href="${formatLink(webLink)}" target="_blank" class="btn btn-outline">Website</a>` : ''}
            </div>
        `;

        if (currentPopup) currentPopup.remove();

        currentPopup = new mapboxgl.Popup({ offset: 35, closeButton: false }) // Offset slightly higher for the photo marker
            .setLngLat(coordinates)
            .setHTML(html)
            .addTo(map);

        const canvas = map.getCanvas();
        canvas.classList.add('map-dimmed');
        
        currentPopup.on('close', () => { 
            canvas.classList.remove('map-dimmed'); 
            currentPopup = null;
        });

        map.flyTo({ center: coordinates, speed: 0.6, curve: 1, pitch: 72, offset: [0, -100], essential: true });
    }

    // Fallback if they click the invisible layer directly instead of the photo bubble
    map.on('click', 'grantsentmemap', (e) => triggerPopup(e.features[0]));

    // --- SEARCH & FILTER LOGIC ---
    let currentCategory = 'all';
    let currentSearch = '';

    function updateFilters() {
        const filters = ['all']; 
        if (currentCategory !== 'all') filters.push(['==', ['downcase', ['get', 'Category']], currentCategory.toLowerCase()]);
        if (currentSearch !== '') filters.push(['in', currentSearch.toLowerCase(), ['downcase', ['get', 'Name']]]);
        
        const finalFilter = filters.length > 1 ? filters : null;
        map.setFilter('grantsentmemap', finalFilter);
        if (map.getLayer('pulse-layer')) map.setFilter('pulse-layer', finalFilter);

        // Hide/Show the HTML Photo Markers based on the filter
        Object.values(dynamicMarkers).forEach(markerObj => {
            const props = markerObj.feature.properties;
            const catMatch = currentCategory === 'all' || (props.Category && props.Category.toLowerCase() === currentCategory.toLowerCase());
            const searchMatch = currentSearch === '' || (props.Name && props.Name.toLowerCase().includes(currentSearch.toLowerCase()));
            
            if (catMatch && searchMatch) {
                markerObj.marker.getElement().style.display = 'flex'; // Uses flex to keep the letter centered if fallback
            } else {
                markerObj.marker.getElement().style.display = 'none';
            }
        });
    }

    document.getElementById('category-select').addEventListener('change', (e) => { currentCategory = e.target.value; updateFilters(); });
    document.getElementById('search-input').addEventListener('input', (e) => { currentSearch = e.target.value; updateFilters(); });

    map.on('mouseenter', 'grantsentmemap', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'grantsentmemap', () => { map.getCanvas().style.cursor = ''; });

    document.getElementById('enter-btn').addEventListener('click', () => {
        const overlay = document.getElementById('welcome-overlay');
        overlay.style.opacity = '0'; 
        setTimeout(() => { overlay.style.display = 'none'; resetIdleTimer(); }, 500); 
    });
</script>
</body>
</html>
