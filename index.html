<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Grant's Picks | Ignition Social</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>
<style>
    body { margin: 0; padding: 0; background-color: #0d0d0d; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }

    /* --- APPLE-STYLE GLASS UI --- */
    .glass-ui {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    /* WATERMARK */
    .watermark {
        position: absolute; top: 20px; left: 20px; z-index: 10;
        padding: 10px 16px; color: #fff; font-size: 11px; font-weight: 700;
        text-transform: uppercase; letter-spacing: 1.5px; text-decoration: none;
        transition: transform 0.2s ease;
    }
    .watermark:hover { transform: scale(1.05); color: #FF0000; }

    /* FILTER DROPDOWN */
    .filter-group {
        position: absolute; top: 20px; right: 20px; z-index: 10;
        padding: 10px; color: #fff;
    }
    #category-select {
        background: transparent; color: #fff; border: none; font-weight: 600;
        font-family: inherit; cursor: pointer; outline: none; padding-left: 5px;
    }
    #category-select option { background: #1a1a1a; color: #fff; }

    /* --- MODERN POPUP --- */
    .mapboxgl-popup-content {
        padding: 0; background: #fff; border-radius: 20px; overflow: hidden;
        box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: none; width: 280px;
    }
    .popup-img { width: 100%; height: 180px; object-fit: cover; }
    .popup-inner { padding: 18px; }
    .popup-title { font-weight: 800; font-size: 20px; color: #000; margin-bottom: 4px; }
    .popup-meta { color: #FF0000; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    
    .btn-container { display: flex; gap: 8px; margin-top: 15px; }
    .btn { 
        flex: 1; text-align: center; padding: 12px; font-size: 11px; border-radius: 10px;
        font-weight: 800; text-decoration: none; text-transform: uppercase; transition: opacity 0.2s;
    }
    .btn-black { background: #000; color: #fff; }
    .btn-reel { background: #FF0000; color: #fff; }

    /* MAP FOCUS EFFECT */
    .mapboxgl-canvas { transition: filter 0.6s cubic-bezier(0.4, 0, 0.2, 1) !important; }
    .map-dimmed { filter: brightness(0.4) blur(8px) !important; }

</style>
</head>
<body>

<a href="https://instagram.com/grantwillian" target="_blank" class="watermark glass-ui">Created by @grantwillian</a>

<div class="filter-group glass-ui">
    <select id="category-select">
        <option value="all">ALL SPOTS</option>
        <option value="Restaurant">RESTAURANTS</option>
        <option value="Bakery/Cafe">BAKERIES</option>
        <option value="Bar/Speakeasy">BARS</option>
    </select>
</div>

<div id="map"></div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiZ3JhbnRzZW50bWUiLCJhIjoiY21semtoaHl5MDgyMzNlb2s3M2J5eGdyMiJ9.O0JLwYp11XNKPZB9FDXgMg';
    
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/dark-v11', // High-end dark base
        center: [-73.988, 40.730], 
        zoom: 15.8,
        pitch: 62, // Tilted for 3D depth
        bearing: -15,
        antialias: true
    });

    map.on('load', () => {
        // --- ADD 3D BUILDINGS ---
        const layers = map.getStyle().layers;
        const labelLayerId = layers.find(l => l.type === 'symbol' && l.layout['text-field']).id;

        map.addLayer({
            'id': '3d-buildings',
            'source': 'composite',
            'source-layer': 'building',
            'filter': ['==', 'extrude', 'true'],
            'type': 'fill-extrusion',
            'minzoom': 15,
            'paint': {
                'fill-extrusion-color': '#222',
                'fill-extrusion-height': ['get', 'height'],
                'fill-extrusion-base': ['get', 'min_height'],
                'fill-extrusion-opacity': 0.6
            }
        }, labelLayerId);

        // --- ADD CINEMATIC SKY & FOG ---
        map.setFog({
            'range': [0.8, 8],
            'color': '#000',
            'horizon-blend': 0.1
        });
    });

    // ... (Keep your existing click/popup logic here, it will automatically look better on the new map)
</script>
</body>
</html>
