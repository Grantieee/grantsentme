<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Grant's Picks | Ignition Social</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>
<style>
    :root {
        --brand-red: #FF0000;
        --ios-blur: blur(15px);
    }
    body { margin: 0; padding: 0; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }

    /* --- APPLE-STYLE GLASS UI --- */
    .glass-ui {
        background: rgba(28, 28, 30, 0.6);
        backdrop-filter: var(--ios-blur);
        -webkit-backdrop-filter: var(--ios-blur);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 14px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    /* --- BRANDING WATERMARK --- */
    .watermark {
        position: absolute; top: 20px; left: 20px; z-index: 10;
        color: #fff; font-size: 11px; font-weight: 800;
        text-transform: uppercase; letter-spacing: 1.5px; text-decoration: none;
        padding: 10px 16px; transition: transform 0.2s ease, color 0.2s;
    }
    .watermark:hover { color: var(--brand-red); transform: scale(1.02); }

    /* --- TOP BAR: SEARCH & FILTER --- */
    .top-bar-container {
        position: absolute; top: 20px; right: 20px; z-index: 10; 
        display: flex; align-items: center; padding: 6px 12px; gap: 12px;
    }
    
    .search-container { display: flex; align-items: center; }
    #search-input {
        background: transparent; border: none; color: #fff; outline: none;
        font-family: inherit; font-size: 13px; font-weight: 500; width: 140px;
        transition: width 0.3s ease;
    }
    #search-input::placeholder { color: rgba(255,255,255,0.6); font-weight: 500; }
    #search-input:focus { width: 180px; } /* Expands slightly when typing */

    .divider { width: 1px; height: 18px; background: rgba(255,255,255,0.2); }

    .filter-container { display: flex; align-items: center; }
    .filter-label { color: rgba(255,255,255,0.6); font-weight: 800; font-size: 10px; margin-right: 6px; letter-spacing: 1px; }
    #category-select {
        background: transparent; color: #fff; border: none; font-weight: 700;
        font-size: 12px; font-family: inherit; cursor: pointer; outline: none;
    }
    #category-select option { background: #1c1c1e; color: #fff; }

    /* --- WELCOME OVERLAY STYLES --- */
    #welcome-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.85); z-index: 9999; 
        display: flex; justify-content: center; align-items: center;
        transition: opacity 0.4s ease; 
    }
    .welcome-content {
        background: #fff; padding: 40px 30px; border-radius: 24px;
        box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center; max-width: 320px;
        border: 2px solid rgba(0,0,0,0.1);
    }
    .welcome-title { font-weight: 900; text-transform: uppercase; font-size: 26px; margin-bottom: 10px; color: #000; letter-spacing: -0.5px; }
    .welcome-desc { font-size: 14px; color: #555; margin-bottom: 25px; line-height: 1.5; font-weight: 500; }
    .welcome-btn {
        background: var(--brand-red); color: #fff; border: none; padding: 14px 24px;
        font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 14px;
        letter-spacing: 1px; width: 100%; border-radius: 12px; transition: transform 0.2s, background 0.2s;
    }
    .welcome-btn:hover { background: #cc0000; transform: translateY(-2px); }

    /* --- THE CINEMATIC MAP BLUR --- */
    .mapboxgl-canvas { transition: filter 0.6s cubic-bezier(0.4, 0, 0.2, 1) !important; }
    .map-dimmed { filter: blur(8px) brightness(0.3) !important; }

    /* GPS BUTTON FIX FOR DARK MODE */
    .mapboxgl-ctrl-group { background: rgba(28, 28, 30, 0.7) !important; backdrop-filter: var(--ios-blur); border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 10px !important; overflow: hidden; }
    .mapboxgl-ctrl-icon { filter: invert(1); }

    /* --- PREMIUM POPUP STYLES --- */
    .mapboxgl-popup-content {
        padding: 0; background: #fff; border-radius: 20px; overflow: hidden;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5); width: 280px; border: none;
    }
    .popup-inner { padding: 18px; }
    .popup-title { font-weight: 900; text-transform: uppercase; font-size: 20px; margin-bottom: 4px; letter-spacing: -0.5px; }
    .popup-meta { font-size: 11px; color: #888; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px; }
    .popup-score { color: var(--brand-red); font-weight: 900; font-size: 14px; margin-bottom: 12px; }
    .popup-img { width: 100%; height: 180px; object-fit: cover; display: block; }
    .popup-vibe { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 8px; background: #f4f4f4; padding: 6px 10px; border-radius: 6px; display: inline-block; }
    .popup-take { font-size: 13px; line-height: 1.5; color: #222; margin-bottom: 12px; padding-top: 8px; }
    
    .btn-container { display: flex; gap: 8px; padding: 0 18px 18px 18px; }
    .btn { flex: 1; text-align: center; padding: 10px; font-size: 11px; font-weight: 800; text-decoration: none; text-transform: uppercase; border-radius: 10px; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.8; }
    .btn-black { background: #000; color: #fff; }
    .btn-outline { background: #f4f4f4; color: #000; }
</style>
</head>
<body>

<div id="welcome-overlay">
    <div class="welcome-content">
        <div class="welcome-title">Grant's Picks</div>
        <div class="welcome-desc">A highly curated, no-bullshit guide to my favorite spots in the city. Good food, good drinks, good vibes only.</div>
        <button class="welcome-btn" id="enter-btn">Explore the Map</button>
    </div>
</div>

<a href="https://instagram.com/grantwillian" target="_blank" class="watermark glass-ui">@grantwillian</a>

<div class="top-bar-container glass-ui">
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search for a spot..." autocomplete="off">
    </div>
    <div class="divider"></div>
    <div class="filter-container">
        <span class="filter-label">FILTER:</span>
        <select id="category-select">
            <option value="all">Show All</option>
            <option value="Restaurant">Restaurants</option>
            <option value="Bakery/Cafe">Bakeries</option>
            <option value="Bar/Speakeasy">Bars</option>
            <option value="Street Food">Street Food</option>
            <option value="Shop">Shops</option>
        </select>
    </div>
</div>

<div id="map"></div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiZ3JhbnRzZW50bWUiLCJhIjoiY21semtoaHl5MDgyMzNlb2s3M2J5eGdyMiJ9.O0JLwYp11XNKPZB9FDXgMg';
    
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/grantsentme/cmlzkldac001601scglds8nyx', 
        center: [-73.988, 40.730], 
        zoom: 15.5,
        pitch: 65,
        bearing: -15,
        antialias: true
    });

    map.addControl(new mapboxgl.GeolocateControl({
        positionOptions: { enableHighAccuracy: true },
        trackUserLocation: true,
        showUserHeading: true
    }), 'bottom-right');
    map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');

    map.on('load', () => {
        map.setFog({ 'range': [0.5, 10], 'color': '#000', 'horizon-blend': 0.05 });

        if (!map.getSource('composite')) {
            map.addSource('composite', { type: 'vector', url: 'mapbox://mapbox.mapbox-streets-v8' });
        }
        
        const layers = map.getStyle().layers;
        let labelLayerId;
        for (let i = 0; i < layers.length; i++) {
            if (layers[i].type === 'symbol' && layers[i].layout['text-field']) {
                labelLayerId = layers[i].id; break;
            }
        }

        map.addLayer({
            'id': '3d-buildings',
            'source': 'composite',
            'source-layer': 'building',
            'filter': ['==', 'extrude', 'true'],
            'type': 'fill-extrusion',
            'minzoom': 14,
            'paint': {
                'fill-extrusion-color': '#1a1a1a',
                'fill-extrusion-height': ['get', 'height'],
                'fill-extrusion-base': ['get', 'min_height'],
                'fill-extrusion-opacity': 0.8
            }
        }, labelLayerId);

        const existingLayer = map.getLayer('grantsentmemap');
        if (existingLayer) {
            map.addLayer({
                'id': 'pulse-layer',
                'type': 'circle',
                'source': existingLayer.source,
                'source-layer': existingLayer.sourceLayer,
                'paint': {
                    'circle-radius': 0, 'circle-color': '#FF0000', 'circle-opacity': 1, 'circle-stroke-width': 0
                }
            }, 'grantsentmemap');

            let radius = 0; let opacity = 1;
            function animateMarker() {
                radius += 0.25; opacity -= 0.015;
                if (radius > 18) { radius = 0; opacity = 1; }
                map.setPaintProperty('pulse-layer', 'circle-radius', radius);
                map.setPaintProperty('pulse-layer', 'circle-opacity', Math.max(0, opacity)); 
                requestAnimationFrame(animateMarker);
            }
            animateMarker();
        }
    });

    map.on('click', 'grantsentmemap', (e) => {
        const props = e.features[0].properties;
        const coordinates = e.features[0].geometry.coordinates.slice();

        const imgSource = props['Photo URL'] || props['Photo URL '];
        const socialLink = props['Social Link'] || props['IG Link'];
        const webLink = props['Link to their Website'];
        const cuisine = props.Cuisine || '';
        const price = props.Price || '';
        const vibe = props.Vibe || '';
        const metaText = [cuisine, price].filter(Boolean).join(' &bull; ');

        const formatLink = (link) => {
            if (!link) return null;
            let clean = link.trim();
            if (clean.startsWith('@')) return `https://www.instagram.com/${clean.replace('@','')}`;
            if (!clean.startsWith('http')) return `https://${clean}`;
            return clean;
        };

        const html = `
            ${imgSource ? `<img class="popup-img" src="${imgSource.trim()}" onerror="this.style.display='none'">` : ''}
            <div class="popup-inner">
                <div class="popup-title">${props.Name || 'Place Name'}</div>
                ${metaText ? `<div class="popup-meta">${metaText}</div>` : ''}
                <div class="popup-score">SCORE: ${props.Score || 'N/A'}</div>
                ${vibe ? `<div class="popup-vibe">Vibe: ${vibe}</div>` : ''}
                <div class="popup-take">${props.Review || 'No review yet.'}</div>
            </div>
            <div class="btn-container">
                ${socialLink ? `<a href="${formatLink(socialLink)}" target="_blank" class="btn btn-black">Social</a>` : ''}
                ${webLink ? `<a href="${formatLink(webLink)}" target="_blank" class="btn btn-outline">Website</a>` : ''}
            </div>
        `;

        const popup = new mapboxgl.Popup({ offset: 25, closeButton: false })
            .setLngLat(coordinates)
            .setHTML(html)
            .addTo(map);

        const canvas = map.getCanvas();
        canvas.classList.add('map-dimmed');
        popup.on('close', () => { canvas.classList.remove('map-dimmed'); });

        map.flyTo({ center: coordinates, speed: 0.6, curve: 1, pitch: 70, offset: [0, -100], essential: true });
    });

    // --- UNIFIED SEARCH & FILTER LOGIC ---
    let currentCategory = 'all';
    let currentSearch = '';

    function updateFilters() {
        const filters = ['all']; // 'all' means all conditions must be true
        
        if (currentCategory !== 'all') {
            filters.push(['==', ['downcase', ['get', 'Category']], currentCategory.toLowerCase()]);
        }
        
        if (currentSearch !== '') {
            // Checks if the typed search text exists anywhere inside the "Name" property
            filters.push(['in', currentSearch.toLowerCase(), ['downcase', ['get', 'Name']]]);
        }

        const finalFilter = filters.length > 1 ? filters : null;
        
        map.setFilter('grantsentmemap', finalFilter);
        if (map.getLayer('pulse-layer')) {
            map.setFilter('pulse-layer', finalFilter);
        }
    }

    document.getElementById('category-select').addEventListener('change', (e) => {
        currentCategory = e.target.value;
        updateFilters();
    });

    document.getElementById('search-input').addEventListener('input', (e) => {
        currentSearch = e.target.value;
        updateFilters();
    });

    map.on('mouseenter', 'grantsentmemap', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'grantsentmemap', () => { map.getCanvas().style.cursor = ''; });

    document.getElementById('enter-btn').addEventListener('click', () => {
        const overlay = document.getElementById('welcome-overlay');
        overlay.style.opacity = '0'; 
        setTimeout(() => { overlay.style.display = 'none'; }, 400); 
    });
</script>
</body>
</html>
